# SERVER
server.port=${PORT:8080}
server.tomcat.allow-encoded-slash=true
server.tomcat.relaxed-path-chars=/
server.tomcat.relaxed-query-chars=/

# DATABASE (Supabase Transaction Pooler)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# HIKARI POOL (Supabase Safe Config)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1

# SECURITY / JWT
security.jwt.secret=${JWT_SECRET}
security.jwt.issuer=${JWT_ISSUER}
security.jwt.access-ttl-seconds=${JWT_ACCESS_TTL_SECONDS:3600}
security.jwt.refresh-ttl-seconds=${JWT_REFRESH_TTL_SECONDS:86400}
security.jwt.refresh-token-cookie-name=${JWT_REFRESH_COOKIE_NAME:refreshToken}
security.jwt.cookie-secure=true
security.jwt.cookie-http-only=true
security.jwt.cookie-same-site=lax

# REDIS
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
# spring.data.redis.ssl.enabled=true   # enable only if provider requires TLS

# SUPABASE
supabase.url=${SUPABASE_URL}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}

# DATASETS
datasets.codeforces.ndjson-url=${CODEFORCES_NDJSON_URL}

# LOGGING
logging.level.org.springframework.security=INFO
logging.level.root=INFO